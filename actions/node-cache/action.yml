name: Cache Node.js Dependencies
description: Internal composite action for Node.js dependency caching logic

inputs:
  fail-on-cache-miss:
    default: "false"
    description: If true, fails if cache is missing
    required: false
  package-manager:
    description: Package manager to cache for (bun, npm, or pnpm)
    required: true

outputs:
  cache-key:
    description: Primary cache key used for restore and save
    value: ${{ steps.cache-restore.outputs.cache-primary-key }}
  cache-paths:
    description: Cache paths used for restore and save
    # Keep the exported cache paths in sync with the restore/save action inputs below.
    value: >-
      ${{
        inputs.package-manager == 'bun' && '~/.bun/install/cache' ||
        inputs.package-manager == 'pnpm' && '~/.pnpm-store' ||
        '~/.npm'
      }}
  cache-status:
    description: "Descriptive cache status: 'primary', 'fallback', or 'not-found'"
    value: >-
      ${{
        steps.cache-restore.outputs.cache-hit == 'true' && 'primary' ||
        steps.cache-restore.outputs.cache-hit == 'false' && 'fallback' ||
        'not-found'
      }}

runs:
  using: composite
  steps:
    - name: Validate package manager
      shell: bash
      run: | #shell
        case "${{ inputs.package-manager }}" in
          bun | npm | pnpm)
            ;;
          *)
            echo "Unsupported package manager: ${{ inputs.package-manager }}" >&2
            exit 1
            ;;
        esac

    - uses: actions/cache/restore@v5
      id: cache-restore
      with:
        fail-on-cache-miss: ${{ inputs.fail-on-cache-miss }}
        # Cache invalidation stays sensitive to both lockfiles and package-manager config.
        key: >-
          ${{
            format(
              'node-deps-{0}-{1}-{2}-{3}-{4}',
              runner.os,
              runner.arch,
              inputs.package-manager,
              hashFiles('**/bun.lock', '**/package-lock.json', '**/pnpm-lock.yaml') || 'no-lockfile',
              hashFiles('**/bunfig.toml', '**/.npmrc', '**/patches/**', '**/pnpm-workspace.yaml', '**/pnpmfile.cjs') || 'no-config'
            )
          }}
        path: >-
          ${{
            inputs.package-manager == 'bun' && '~/.bun/install/cache' ||
            inputs.package-manager == 'pnpm' && '~/.pnpm-store' ||
            '~/.npm'
          }}
        # Allow fallback reuse across config-only changes before falling back to any cache for the package manager.
        restore-keys: |
          ${{
            format(
              'node-deps-{0}-{1}-{2}-{3}-',
              runner.os,
              runner.arch,
              inputs.package-manager,
              hashFiles('**/bun.lock', '**/package-lock.json', '**/pnpm-lock.yaml') || 'no-lockfile'
            )
          }}
          ${{ format('node-deps-{0}-{1}-{2}-', runner.os, runner.arch, inputs.package-manager) }}
