name: Cache Node.js Dependencies
description: Internal composite action for Node.js dependency caching logic

inputs:
  fail-on-cache-miss:
    default: "false"
    description: If true, fails if cache is missing
    required: false
  package-manager:
    description: Package manager to cache for (bun, npm, or pnpm)
    required: true

outputs:
  cache-key:
    description: Primary cache key used for restore and save
    value: ${{ steps.cache-metadata.outputs.key }}
  cache-paths:
    description: Cache paths used for restore and save
    value: ${{ steps.cache-metadata.outputs.paths }}
  cache-status:
    description: "Descriptive cache status: 'primary', 'fallback', or 'not-found'"
    value: ${{ steps.determine-cache-status.outputs.status }}

runs:
  using: composite
  steps:
    - name: Determine cache metadata
      id: cache-metadata
      shell: bash
      env:
        CONFIG_HASH: ${{ hashFiles('**/bunfig.toml', '**/.npmrc', '**/patches/**', '**/pnpm-workspace.yaml', '**/pnpmfile.cjs') }}
        LOCKFILE_HASH: ${{ hashFiles('**/bun.lock', '**/package-lock.json', '**/pnpm-lock.yaml') }}
      run: | #shell
        config_hash="${CONFIG_HASH:-}"
        lockfile_hash="${LOCKFILE_HASH:-}"

        if [[ -z "$lockfile_hash" ]]; then
          lockfile_hash="no-lockfile"
        fi

        if [[ -z "$config_hash" ]]; then
          config_hash="no-config"
        fi

        case "${{ inputs.package-manager }}" in
          bun)
            store_path="$HOME/.bun/install/cache"
            ;;
          npm)
            store_path="$HOME/.npm"
            ;;
          pnpm)
            store_path="$HOME/.pnpm-store"
            ;;
          *)
            echo "Unsupported package manager: ${{ inputs.package-manager }}" >&2
            exit 1
            ;;
        esac

        cache_paths="$store_path"

        primary_key="node-deps-${{ runner.os }}-${{ runner.arch }}-${{ inputs.package-manager }}-$lockfile_hash-$config_hash"

        {
          echo "key=$primary_key"
          echo "paths<<EOF"
          printf '%s\n' "$cache_paths"
          echo "EOF"
          echo "restore-keys<<EOF"
          echo "node-deps-${{ runner.os }}-${{ runner.arch }}-${{ inputs.package-manager }}-$lockfile_hash-"
          echo "node-deps-${{ runner.os }}-${{ runner.arch }}-${{ inputs.package-manager }}-"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - uses: actions/cache/restore@v5
      id: cache-restore
      with:
        fail-on-cache-miss: ${{ inputs.fail-on-cache-miss }}
        key: ${{ steps.cache-metadata.outputs.key }}
        path: ${{ steps.cache-metadata.outputs.paths }}
        restore-keys: ${{ steps.cache-metadata.outputs.restore-keys }}

    # Interpret cache-hit output into three-part cache-status.
    # See https://github.com/actions/cache/issues/1566
    - name: Determine cache status
      id: determine-cache-status
      shell: bash
      run: | #shell
        if [[ "${{ steps.cache-restore.outputs.cache-hit }}" == "true" ]]; then
          echo "status=primary" >> $GITHUB_OUTPUT
        elif [[ "${{ steps.cache-restore.outputs.cache-hit }}" == "false" ]]; then
          echo "status=fallback" >> $GITHUB_OUTPUT
        else
          echo "status=not-found" >> $GITHUB_OUTPUT
        fi
