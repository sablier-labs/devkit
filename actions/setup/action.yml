name: Devkit Setup
description: Internal composite action for installing the dependencies required for using the devkit

inputs:
  frozen-lockfile:
    description: Whether to install the dependencies with the frozen lockfile
    default: "true"
    required: false
  package-manager:
    description: Package manager to install Node.js dependencies with (auto-detected from lockfiles if not provided)
    required: false
  enable-cache:
    description: Whether to enable Node.js dependency caching
    default: "true"
    required: false
  save-cache:
    description: Whether this job may publish a refreshed Node.js dependency cache after install. Enable in at most one parallel job.
    default: "false"
    required: false
  token:
    description: GitHub token used by checkout action (needed when workflows must preserve app auth for protected branch pushes)
    required: false

outputs:
  cache-status:
    description: "Descriptive cache status: 'primary', 'fallback', or 'not-found'"
    value: ${{ steps.node-cache.outputs.cache-status }}

runs:
  using: composite
  steps:
    - name: Check out the repo
      uses: actions/checkout@v6
      with:
        token: ${{ inputs.token || github.token }}

    # ---------------------------------------------------------------------------- #
    #                                    Node.js                                   #
    # ---------------------------------------------------------------------------- #

    - name: Install Just
      uses: taiki-e/install-action@v2
      with:
        # Pin >= 1.53.0: the just/settings.just uses `set lists`, which is only available from 1.53.0 onwards.
        # taiki-e's `just@latest` lags behind upstream, so pin explicitly until the manifest catches up.
        tool: just@1.53.0

    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: "24"
        package-manager-cache: false

    - name: Detect package manager
      id: detect-pm
      shell: bash
      env:
        INPUT_PACKAGE_MANAGER: ${{ inputs.package-manager }}
      run: | #shell
        package_manager=""
        if [ -f "package.json" ]; then
          package_manager="$(
            node --input-type=module <<'EOF'
        import { readFileSync } from "node:fs";

        try {
          const packageJson = JSON.parse(readFileSync("package.json", "utf8"));
          process.stdout.write(typeof packageJson.packageManager === "string" ? packageJson.packageManager : "");
        } catch {
          process.exitCode = 0;
        }
        EOF
          )"
        fi

        package_manager_name=""
        has_pnpm_package_manager="false"
        case "$package_manager" in
          bun@*)
            package_manager_name="bun"
            ;;
          npm@*)
            package_manager_name="npm"
            ;;
          pnpm@*)
            package_manager_name="pnpm"
            has_pnpm_package_manager="true"
            ;;
          "")
            ;;
          *)
            echo "Unsupported packageManager: $package_manager" >&2
            exit 1
            ;;
        esac

        if [ -n "$INPUT_PACKAGE_MANAGER" ]; then
          pm="$INPUT_PACKAGE_MANAGER"
        elif [ -n "$package_manager_name" ]; then
          pm="$package_manager_name"
        elif [ -f "bun.lock" ] || [ -f "bun.lockb" ]; then
          pm="bun"
        elif [ -f "pnpm-lock.yaml" ]; then
          pm="pnpm"
        elif [ -f "package-lock.json" ]; then
          pm="npm"
        else
          pm="npm"
        fi

        echo "package-manager=$pm" >> "$GITHUB_OUTPUT"
        echo "has-pnpm-package-manager=$has_pnpm_package_manager" >> "$GITHUB_OUTPUT"

    - name: Install Bun
      if: steps.detect-pm.outputs.package-manager == 'bun'
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install Pnpm from packageManager
      if: steps.detect-pm.outputs.package-manager == 'pnpm' && steps.detect-pm.outputs.has-pnpm-package-manager == 'true'
      uses: pnpm/action-setup@v6

    - name: Install Pnpm fallback
      if: steps.detect-pm.outputs.package-manager == 'pnpm' && steps.detect-pm.outputs.has-pnpm-package-manager != 'true'
      uses: pnpm/action-setup@v6
      with:
        version: "11"

    - name: Install Ni package manager resolver
      run: npm install -g @antfu/ni
      shell: bash

    - uses: sablier-labs/devkit/actions/node-cache@main
      if: inputs.enable-cache == 'true'
      id: node-cache
      with:
        package-manager: ${{ steps.detect-pm.outputs.package-manager }}

    - name: Install the Node.js dependencies
      env:
        # Composite-action inputs are exposed via expressions, not shell variables.
        FROZEN_LOCKFILE: ${{ inputs.frozen-lockfile }}
      run: | #shell
        if [ "$FROZEN_LOCKFILE" = "true" ]; then
          ni --frozen
        else
          ni
        fi
      shell: bash

    - name: Save the Node.js dependency cache
      # Only one parallel job should publish a refreshed cache, and only when restore was not an exact hit.
      if: inputs.enable-cache == 'true' && inputs.save-cache == 'true' && steps.node-cache.outputs.cache-status != 'primary'
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.node-cache.outputs.cache-key }}
        path: ${{ steps.node-cache.outputs.cache-paths }}
